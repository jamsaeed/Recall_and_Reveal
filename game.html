<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" href="./icon/hearticon.jpg">
    <link
      href="https://fonts.googleapis.com/css2?family=VT323&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./script.js"></script>

    <title>Memory Card Game</title>
  </head>
  <body>
    <div class="text">
      <h1>Recall & Reveal</h1>
      <h3>Start Playing</h3>
    </div>

    <main class="container">
      <div class="time-and-score">
        <div>time <span class="counting-time">60</span></div>
        <div>score<span class="cards-score">000</span></div>
      </div>

      <div class="game-container"></div>
    </main>
    <button class="play-button" onclick="reLoad()">play again</button>
    <button id="main-menu" >Main Menu</button>

    <div class="pop-container">
      <div class="losing-popup">
        <h2 class="text-popup">Game Over!</h2>
        <p id="LosingMessage"> Your Score : 0</p>
        <button class="popUp-btn" id="loseplayAgain">Play Again</button>
        <button id="losingquit">Quit</button>
      </div>
    </div>
    <div class="pop-container2">
      <div class="winnig-popup">
        <h2 class="text-popup">Woow You Won!</h2>
        <p id="message"> Your Score : 0</p>
        <button class="popUp-btn" id="playAgain">Play Again</button>
        <button id="quit">Quit</button>
      </div>
    </div>
  </body>
</html>
